<nav class="sticky top-0 z-[1000] bg-white/90 border-b border-slate-200 backdrop-blur-md shadow-sm transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 md:px-8 lg:px-12 mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between py-4">
      
      <a routerLink="/" class="flex items-center gap-3 text-2xl font-bold text-primary hover:text-secondary transition-colors shrink-0">
        <i class="fas fa-code text-3xl text-secondary"></i>
        <span>TechVision</span>
      </a>

      <div class="hidden lg:flex items-center gap-8 ml-16 flex-1">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" 
             routerLinkActive="text-secondary after:scale-x-100 "
             [routerLinkActiveOptions]="{exact: true}"
             class="relative text-[14px] font-medium hover:text-secondary transition-colors py-2
                    after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-[3px] 
                    after:bg-secondary after:rounded-full after:scale-x-0 after:origin-left after:transition-transform after:duration-300">
            {{ link.label }}
          </a>
        }
      </div>

      <div class="flex items-center gap-4">
        <a routerLink="/hire-us" class="btn btn-primary btn-md hidden sm:inline-flex">
          Get Started
        </a>

        <button (click)="toggleMenu()" class="lg:hidden flex flex-col gap-1.5 p-2 focus:outline-none" aria-label="Toggle Menu">
          <span [class]="'w-6 h-[3px] bg-slate-800 rounded-full transition-all duration-300 ' + (isMenuOpen() ? 'rotate-45 translate-y-2' : '')"></span>
          <span [class]="'w-6 h-[3px] bg-slate-800 rounded-full transition-all duration-300 ' + (isMenuOpen() ? 'opacity-0' : '')"></span>
          <span [class]="'w-6 h-[3px] bg-slate-800 rounded-full transition-all duration-300 ' + (isMenuOpen() ? '-rotate-45 -translate-y-2' : '')"></span>
        </button>
      </div>
    </div>

    <div [class]="'lg:hidden overflow-hidden transition-all duration-300 ease-in-out ' + (isMenuOpen() ? 'max-h-[500px] pb-6' : 'max-h-0')">
      <div class="flex flex-col gap-2 bg-slate-50 rounded-xl p-4 border border-slate-100">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" 
             (click)="isMenuOpen.set(false)"
             routerLinkActive="text-secondary bg-white shadow-sm"
             [routerLinkActiveOptions]="{exact: true}"
             class="px-4 py-3 text-base font-semibold text-slate-700 rounded-lg transition-all">
            {{ link.label }}
          </a>
        }
        <a routerLink="/hire-us" (click)="isMenuOpen.set(false)" class="btn btn-primary w-full mt-2">Get Started</a>
      </div>
    </div>
  </div>
</nav>
