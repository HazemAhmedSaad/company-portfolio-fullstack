<section id="team" class="p-6 animate-fade-in">
  <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Our Team</h1>
      <p class="text-slate-500 mt-1">Manage your professional experts and their roles.</p>
    </div>
    <button (click)="openModal()" class="btn-primary shadow-xl shadow-indigo-100 group">
      <i class="fas fa-user-plus mr-2 group-hover:scale-110 transition-transform"></i> Add Member
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (member of team; track member.id) {
      <div class="group relative bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300">
        
        <div class="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
          <button (click)="openModal(member)" class="w-9 h-9 rounded-xl bg-slate-50 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
            <i class="fas fa-edit text-sm"></i>
          </button>
          <button (click)="deleteMember(member.id)" class="w-9 h-9 rounded-xl bg-slate-50 text-slate-400 hover:bg-red-50 hover:text-red-600 transition-colors">
            <i class="fas fa-trash text-sm"></i>
          </button>
        </div>

        <div class="text-center">
          <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-indigo-500 rounded-full blur-2xl opacity-10 group-hover:opacity-30 transition-opacity"></div>
            <img [src]="member.avatar" class="relative w-24 h-24 rounded-[2rem] bg-slate-50 border-4 border-white shadow-md mx-auto object-cover">
          </div>

          <h3 class="text-xl font-black text-slate-800 leading-none mb-2">{{ member.name }}</h3>
          <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-4">{{ member.role }}</p>
          
          <p class="text-slate-500 text-sm leading-relaxed mb-6 line-clamp-3">
            {{ member.bio }}
          </p>

          <div class="flex flex-wrap justify-center gap-1.5">
            @for (skill of member.skills; track skill) {
              <span class="px-3 py-1 bg-slate-50 text-slate-600 text-[10px] font-black uppercase rounded-lg border border-slate-100">
                {{ skill }}
              </span>
            }
          </div>
        </div>
      </div>
    }
  </div>
</section>

<div *ngIf="isModalOpen" class="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" (click)="closeModal()">
  <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden transform animate-scale-up" (click)="$event.stopPropagation()">
    
    <div class="px-8 py-6 border-b border-slate-50 flex items-center justify-between">
      <h2 class="text-xl font-black text-slate-800">{{ isEditMode ? 'Update Profile' : 'New Member' }}</h2>
      <button (click)="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-times"></i></button>
    </div>

    <form (ngSubmit)="submitMember()" class="p-8 space-y-5">
      <div class="space-y-1">
        <label class="label-style">Full Name</label>
        <input type="text" name="name" [(ngModel)]="currentMember.name" class="input-modern" placeholder="e.g. Alex Turner" required>
      </div>

      <div class="space-y-1">
        <label class="label-style">Position</label>
        <input type="text" name="role" [(ngModel)]="currentMember.role" class="input-modern" placeholder="e.g. UI Designer" required>
      </div>

      <div class="space-y-1">
        <label class="label-style">Bio</label>
        <textarea name="bio" [(ngModel)]="currentMember.bio" class="input-modern min-h-[100px]" placeholder="Briefly describe them..."></textarea>
      </div>

      <div class="space-y-1">
        <label class="label-style">Skills (comma separated)</label>
        <input type="text" name="skills" [(ngModel)]="currentMember.skills" class="input-modern" placeholder="Angular, UX, Figma">
      </div>

      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 py-4 font-bold text-white bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
          {{ isEditMode ? 'Save Changes' : 'Confirm Add' }}
        </button>
      </div>
    </form>
  </div>
</div>
